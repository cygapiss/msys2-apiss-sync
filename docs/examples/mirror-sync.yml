name: Mirror sync from upstream

# Install on mirror repo branch sync (set sync as default branch).
# Copy to: sync/.github/workflows/mirror-sync.yml
# master holds upstream package history only; do not commit workflows to master.
# Set repository variable UPSTREAM_REPO (e.g. msys2/MSYS2-packages).
# MSYS2-packages: event-type msys2-packages-updated
# MINGW-packages: event-type mingw-packages-updated
# Dispatches msys2-apiss-sync after push (GITHUB_TOKEN pushes do not trigger on:push workflows).
# Schedule: msys2-apiss-sync mirror-poll.yml triggers this via workflow_dispatch.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sync branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync from upstream
        id: sync
        env:
          UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO }}
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" 2>/dev/null || \
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream master
          git fetch origin master
          BEFORE="$(git rev-parse origin/master 2>/dev/null || true)"
          AFTER="$(git rev-parse upstream/master)"
          if [ -n "$BEFORE" ] && [ "$BEFORE" = "$AFTER" ]; then
            echo "No upstream changes."
            echo "advanced=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Advanced mirror from ${BEFORE:-<none>} to ${AFTER}"
          echo "advanced=true" >> "$GITHUB_OUTPUT"
          echo "sha=${AFTER}" >> "$GITHUB_OUTPUT"

      - name: Push mirror
        if: steps.sync.outputs.advanced == 'true'
        run: |
          if git push origin upstream/master:master; then
            exit 0
          fi
          git push --force-with-lease origin upstream/master:master

      - name: Notify msys2-apiss-sync
        if: steps.sync.outputs.advanced == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.SYNC_DISPATCH_TOKEN }}
          repository: msys2-apiss/msys2-apiss-sync
          event-type: upstream-updated
          client-payload: >-
            {
              "source": "${{ github.repository }}",
              "sha": "${{ steps.sync.outputs.sha }}",
              "ref": "refs/heads/master"
            }
