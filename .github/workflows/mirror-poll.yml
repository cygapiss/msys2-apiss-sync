name: Mirror poll

# Block 2: loop config, compare GitHub tips, workflow_dispatch mirror-sync.
# Entry: node src/mirror-poll/cli.ts (GitHub Actions only; no yarn script).

on:
  push:
    branches:
      - main
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

concurrency:
  group: mirror-poll
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            config
            src

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '26'
          package-manager-cache: false

      - name: Run mirror poll
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node src/mirror-poll/cli.ts
