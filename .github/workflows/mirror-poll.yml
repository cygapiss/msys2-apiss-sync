name: Mirror poll

# Trigger mirror-sync on both mirrors via workflow_dispatch. Per-mirror cron
# (*/5) is unreliable on GitHub-hosted runners; central dispatch is dependable.
# Mirrors.SyncIntervalMinutes=15 in config/sync.json (cron below).

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

concurrency:
  group: mirror-poll
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger mirror sync workflows
        uses: actions/github-script@v7
        env:
          MIRROR_OWNER: msys2-apiss
        with:
          github-token: ${{ secrets.MSYS2_APISS_SYNC_TOKEN }}
          script: |
            const mirrors = ['MSYS2-packages', 'MINGW-packages'];
            for (const repo of mirrors) {
              await github.rest.actions.createWorkflowDispatch({
                owner: process.env.MIRROR_OWNER,
                repo,
                workflow_id: 'mirror-sync.yml',
                ref: 'sync',
              });
              core.info(`Triggered mirror-sync on ${process.env.MIRROR_OWNER}/${repo}`);
            }
